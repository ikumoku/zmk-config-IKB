# =========================================================
# Date: 2026-04-12 15:00
# Filename: config/boards/shields/Test/IKB_L.conf
# @details
# 左手側（Peripheral / 子機）のシステム設定ファイルです。
# 親機用のバッテリー設定や重複していた記述を完全に削除し、
# 必要な機能と通信安定化の設定のみに整理しました。
# =========================================================

CONFIG_NFCT_PINS_AS_GPIOS=y

# --- エンコーダー(ロータリー)設定 ---
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# --- 通信安定化・フリーズ対策 ---
# 左右のBluetooth電波強度を最大化
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# 新しいBluetooth接続アルゴリズムを使用（安定性向上）
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y

# ディープスリープの無効化（復帰時のフリーズ防止）
CONFIG_ZMK_SLEEP=n

# バッテリーレポート機能の無効化（切り分けと安定化のため）
CONFIG_ZMK_BATTERY_REPORTING=n
