CONFIG_NFCT_PINS_AS_GPIOS=y
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

#CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y

# 以前追加した設定（Bluetooth電波強度と安定化）
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y

# ディープスリープの無効化（フリーズ対策）
CONFIG_ZMK_SLEEP=n


# --- 今回追加する設定（左右通信の安定化とフリーズ対策） ---
# 左右通信（Split）におけるバッテリーレベルの同期を無効化する
# （右側マイコンの通信負荷と、USB接続時の処理競合によるフリーズを防ぐ）
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=n
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=n

# バッテリーレポート機能そのものを無効化（切り分けのため一時的にオフ）
CONFIG_ZMK_BATTERY_REPORTING=n
