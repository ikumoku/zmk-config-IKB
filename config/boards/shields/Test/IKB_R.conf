# =========================================================
# Date: 2026-04-09 22:45
# Filename: config/boards/shields/Test/IKB_R.conf
# @details
# 右手側（Peripheral / 子機）専用のシステム設定ファイルです。
# badjeff版ドライバーの新仕様において、.conf から削除された
# スクロール関連やオートマウス関連の設定項目をコメントアウトし、
# 未定義シンボルエラーを解消しています。
# =========================================================

CONFIG_ZMK_KEYBOARD_NAME="IKB_2"

CONFIG_ZMK_MOUSE=y
CONFIG_NFCT_PINS_AS_GPIOS=y
CONFIG_ZMK_BLE=y

CONFIG_SPI=y
CONFIG_INPUT=y

# Zephyr 4.1環境でポインティングデバイスを有効にするための必須設定
CONFIG_ZMK_POINTING=y

# --- トラックボール設定（badjeff_ALT版） ---
CONFIG_PMW3610_ALT=y

# -----------------------------------------------------------------
# 以下の設定は新ドライバーで .conf から .overlay または ZMK標準機能へ
# 移行・廃止されたため、未定義エラーを避けるためにコメントアウトしています
# -----------------------------------------------------------------
# CONFIG_PMW3610_ALT_SCROLL_TICK=16
# CONFIG_PMW3610_ALT_INVERT_SCROLL_X=y
# CONFIG_PMW3610_ALT_POLLING_RATE_125_SW=y
# CONFIG_PMW3610_ALT_AUTOMOUSE_TIMEOUT_MS=700

CONFIG_PMW3610_ALT_RUN_DOWNSHIFT_TIME_MS=3264
CONFIG_PMW3610_ALT_REST1_SAMPLE_TIME_MS=20
CONFIG_PMW3610_ALT_SMART_ALGORITHM=y

# --- 右手（Peripheral）のフリーズ対策・通信安定化設定 ---
CONFIG_ZMK_BATTERY_REPORTING=n
CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=n 
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
CONFIG_ZMK_SLEEP=n
