# =========================================================
# Date: 2026-04-13 21:10
# Filename: config/boards/shields/Test/IKB_R.conf
# @details
# 原因不明のフリーズ（デッドロック）を完全に切り分けるため、
# 処理落ちの最有力原因である「ZMK Studio」と
# 「トラックボールの独自省電力アルゴリズム」を無効化しました。
# =========================================================

CONFIG_ZMK_KEYBOARD_NAME="IKB_2"

# --- 基本機能 ---
CONFIG_ZMK_MOUSE=y
CONFIG_NFCT_PINS_AS_GPIOS=y
CONFIG_ZMK_BLE=y
CONFIG_SPI=y
CONFIG_INPUT=y

# =========================================================
# 【重要】容疑者1：ZMK Studioの無効化
# =========================================================
# PCとの通信待ちでマイコンが固まるのを防ぐため、機能を完全に切ります。
CONFIG_ZMK_STUDIO=n
# CONFIG_ZMK_STUDIO_LOCKING=n  (無効化するためコメントアウト)

# =========================================================
# 【重要】容疑者2：センサー独自の省電力機能を無効化
# =========================================================
CONFIG_ZMK_POINTING=y
CONFIG_PMW3610_ALT=y
# 復帰時のSPI通信ロック（フリーズ）を防ぐためスマートアルゴリズムをオフ
CONFIG_PMW3610_ALT_SMART_ALGORITHM=n
# 下記2つの時間設定も競合を避けるため無効化（コメントアウトまたは削除）
# CONFIG_PMW3610_ALT_RUN_DOWNSHIFT_TIME_MS=3264
# CONFIG_PMW3610_ALT_REST1_SAMPLE_TIME_MS=20

# --- 通信安定化・バッテリー起因のフリーズ対策 ---
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y
CONFIG_ZMK_SLEEP=n
CONFIG_ZMK_BATTERY_REPORTING=n
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=n
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=n

# --- メモリ拡張（全体処理用） ---
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_BT_RX_STACK_SIZE=2048

# --- Bluetoothバッファの拡張（パケット詰まり対策） ---
CONFIG_BT_L2CAP_TX_BUF_COUNT=10
CONFIG_BT_BUF_ACL_TX_COUNT=10
CONFIG_BT_BUF_EVT_RX_COUNT=16
