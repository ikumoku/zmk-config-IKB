# =========================================================
# Date: 2026-04-09 22:05
# Filename: config/boards/shields/Test/IKB_R.conf
# @details
# 右手側（Peripheral / 子機）専用の設定ファイルです。
# エラーの原因だった「存在しないエンコーダ(EC11)」と、
# 「廃止されたパラメータ(MOVEMENT_THRESHOLD)」、
# および「左手専用のバッテリー設定」を削除しています。
# トラックボール（PMW3610）は正しく有効化されています。
# =========================================================

CONFIG_ZMK_KEYBOARD_NAME="IKB_2"

CONFIG_ZMK_MOUSE=y
CONFIG_NFCT_PINS_AS_GPIOS=y
CONFIG_ZMK_BLE=y

CONFIG_SPI=y
CONFIG_INPUT=y

# --- トラックボール設定（有効化） ---
# ドライバーの更新に伴い廃止された CONFIG_PMW3610_MOVEMENT_THRESHOLD のみ削除しています
CONFIG_PMW3610=y
CONFIG_PMW3610_CPI=400
CONFIG_PMW3610_CPI_DIVIDOR=1
CONFIG_PMW3610_ORIENTATION_180=y
CONFIG_PMW3610_SCROLL_TICK=16
CONFIG_PMW3610_INVERT_X=y
CONFIG_PMW3610_INVERT_Y=y
CONFIG_PMW3610_INVERT_SCROLL_X=y
CONFIG_PMW3610_INVERT_SCROLL_Y=n
CONFIG_PMW3610_RUN_DOWNSHIFT_TIME_MS=3264
CONFIG_PMW3610_REST1_SAMPLE_TIME_MS=20
CONFIG_PMW3610_POLLING_RATE_125_SW=y
CONFIG_PMW3610_AUTOMOUSE_TIMEOUT_MS=700
CONFIG_PMW3610_SMART_ALGORITHM=y


# --- 右手（Peripheral）のフリーズ対策・通信安定化設定 ---
# バッテリーレポート機能そのものを無効化（USB接続時の競合・フリーズ防止）
CONFIG_ZMK_BATTERY_REPORTING=n

CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=n 

# Bluetoothの電波強度を最大(+8dBm)にする
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# ディープスリープの無効化（フリーズ対策）
CONFIG_ZMK_SLEEP=n
