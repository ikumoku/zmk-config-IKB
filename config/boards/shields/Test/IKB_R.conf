# =========================================================
# Date: 2026-04-19
# Filename: config/boards/shields/Test/IKB_R.conf
# =========================================================

CONFIG_ZMK_KEYBOARD_NAME="IKB_2"

# --- Basic features ---
CONFIG_ZMK_MOUSE=y
CONFIG_NFCT_PINS_AS_GPIOS=y
CONFIG_ZMK_BLE=y
CONFIG_SPI=y
CONFIG_INPUT=y

# --- Disable ZMK Studio ---
CONFIG_ZMK_STUDIO=n

# --- Sensor settings ---
CONFIG_ZMK_POINTING=y
CONFIG_PMW3610_ALT=y
CONFIG_PMW3610_ALT_SMART_ALGORITHM=n

# --- BLE power ---
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# --- Disable sleep and battery reporting ---
CONFIG_ZMK_SLEEP=n
CONFIG_ZMK_BATTERY_REPORTING=n
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=n
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=n

# --- Stack sizes (freeze prevention) ---
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=8192
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_BT_RX_STACK_SIZE=4096

# --- BLE buffer sizes (reduce packet congestion) ---
CONFIG_BT_L2CAP_TX_BUF_COUNT=16
CONFIG_BT_BUF_ACL_TX_COUNT=16
CONFIG_BT_BUF_ACL_RX_COUNT=16
CONFIG_BT_BUF_EVT_RX_COUNT=16
CONFIG_BT_BUF_CMD_TX_COUNT=4

# --- BLE connection interval tuning ---
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=6
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=12
CONFIG_BT_PERIPHERAL_PREF_LATENCY=30
CONFIG_BT_PERIPHERAL_PREF_TIMEOUT=400

# --- Split keyboard BLE optimization ---
CONFIG_ZMK_SPLIT_BLE_PREF_INT=6
CONFIG_ZMK_SPLIT_BLE_PREF_LATENCY=30
CONFIG_ZMK_SPLIT_BLE_PREF_TIMEOUT=400
